name: ClaudeMeter
options:
  bundleIdPrefix: com.claudemeter
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    version: 2.7.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"

targets:
  ClaudeMeter:
    type: application
    platform: macOS
    sources:
      - ClaudeMeter/Sources
    resources:
      - path: ClaudeMeter/Resources/fetch-quota.sh
        buildPhase: resources

    info:
      path: ClaudeMeter/Resources/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: Claude Meter
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        SUFeedURL: https://raw.githubusercontent.com/eylonshm/claude-meter/main/appcast.xml
        SUPublicEDKey: /wx7c+JEZuhhQj1p0ULc87qrTGz9irqpwXDSz2BL2VI=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudemeter.app
        CODE_SIGN_ENTITLEMENTS: ClaudeMeter/Resources/ClaudeMeter.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: ""
        PRODUCT_NAME: Claude Meter
        MARKETING_VERSION: "1.2.28"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: Sparkle
        product: Sparkle
    entitlements:
      path: ClaudeMeter/Resources/ClaudeMeter.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - group.com.claudemeter.shared

  ClaudeMeterWidget:
    type: app-extension
    platform: macOS
    sources:
      - ClaudeMeterWidget/Sources
    info:
      path: ClaudeMeterWidget/Resources/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudemeter.app.widget
        CODE_SIGN_ENTITLEMENTS: ClaudeMeterWidget/Resources/ClaudeMeterWidget.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application"
        PROVISIONING_PROFILE_SPECIFIER: ""
        PRODUCT_NAME: ClaudeMeterWidgetExtension
        MARKETING_VERSION: "1.2.28"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: ClaudeMeterWidget/Resources/ClaudeMeterWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - group.com.claudemeter.shared
    dependencies:
      - target: ClaudeMeter
        embed: false
        link: false

schemes:
  ClaudeMeter:
    build:
      targets:
        ClaudeMeter: all
        ClaudeMeterWidget: all
    run:
      config: Debug
